name: Docker Build and Push

on:
  push:
    branches:
      - 'main'
      - 'develop*'
  pull_request:
    branches:
      - 'main'
      - 'develop*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  dockerhub-build-and-push:
    name: Build and Push Docker Image
    uses: NelsonDane/Custom-GitHub-Actions/.github/workflows/docker-registry-build-push.yml@f8b1924a21b2b4a993a6e5ac5201283e9f48e451
    with:
      image_name: auto-rsa
      image_tag: ${{ github.ref_name == 'main' && 'latest' || startsWith(github.ref_name, 'develop') && github.ref_name }}
      should_push: ${{ github.ref_name == 'main' || startsWith(github.ref_name, 'develop') }}
      platforms: linux/amd64,linux/arm64
    secrets:
      DOCKER_REGISTRY_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKER_REGISTRY_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
