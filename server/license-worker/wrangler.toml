# auto-rsa license Worker.
#
# Deploy:  cd server/license-worker && npm install && npm run deploy
# Secrets (NEVER put them here — set them once with wrangler):
#   wrangler secret put SIGNING_KEY_PEM   # paste the Ed25519 PRIVATE key PEM
#   wrangler secret put ADMIN_SECRET      # a long random string
#
# The KV id below is the real `rsa_licenses` namespace already on the account.

name = "rsa-license"
main = "src/index.js"

# Signing uses WebCrypto (crypto.subtle Ed25519), which is native in
# workerd — NOT node:crypto, whose sign() is an unenv stub that throws
# "[unenv] crypto.sign is not implemented yet!" on the Worker. nodejs_compat
# is kept (harmless; the code imports no node: modules) so a recent date is fine.
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "LICENSES"
id = "035a2313cf5c4c3db4ce438656c4dcf9"
