services:
    auto-rsa:
        container_name: auto-rsa
        # tini as PID 1 reaps orphaned Chromium processes the browser leaves.
        init: true
        # Build from local source (picks up local code changes with `--build`).
        build: .
        # Later, to pull your fork's published image instead, comment out the
        # `build: .` line above and point this at your registry image:
        # image: ghcr.io/sgben521/auto-rsa:latest
        restart: unless-stopped
        env_file:
            - .env
        tty: true
        volumes:
            # WF device-trust cookies (exported from your own browser) live in
            # ./creds/wellsfargo-cookies.json and are injected by the bot.
            - ./creds:/app/creds

# watchtower intentionally removed from this compose file; run it from its own
# compose file so it doesn't recreate/update this container during testing.
